views:
  - type: custom:grid-layout
    path: bar
    cards:
      - type: vertical-stack
        cards:
          - type: vertical-stack
            cards:
              - type: entities
                title: 🍸🔍 Recherche Spiritueux
                entities:
                  - input_text.bar_recherche_nom
                  - input_text.bar_recherche_type
                  - input_text.bar_recherche_annee
                  - entity: input_boolean.bar_est_maison
                    name: Bouteille maison ?
              - type: conditional
                conditions:
                  - entity: input_boolean.bar_est_maison
                    state: 'on'
                card:
                  type: entities
                  title: 🏠 Paramètres Maison
                  entities:
                    - input_text.bar_base_alcool_utilisee
                    - input_text.bar_ingredients_maison
                    - input_number.bar_maison_abv_base
                    - input_number.bar_maison_volume_base_ml
                    - input_number.bar_maison_volume_eau_ml
                    - input_number.bar_maison_sucre_g
                    - input_number.bar_base_prix_litre
                    - sensor.bar_volume_final_estime
                    - sensor.bar_abv_maison_estime
              - type: entities
                entities:
                  - entity: input_button.bar_bouton_ia_recherche
                    name: Rechercher le spiritueux
                    icon: mdi:clipboard-search-outline
                  - entity: input_button.bar_copy_recherche_to_inventory
                    name: Ajouter au bar
          - type: markdown
            title: 🍸🔍 État de la recherche
            content: >-
              {% set err_msg = states('input_text.bar_derniere_erreur_ia') %}

              {# --- Payload (safe) --- #} {% set payload_raw =
              state_attr('sensor.bar_spiritueux_recherche','payload') |
              default({}, true) %} {% set p = payload_raw | from_json if
              payload_raw is string and payload_raw|trim not in ['', 'unknown',
              'none'] else payload_raw %} {% set p = p if p is mapping else {}
              %}

              {# --- Extraction sécurisée (comme Cave) --- #} {% set nom_data =
              p.nom if p.nom is defined else {"valeur":"En attente"} %} {% set
              nom_data = nom_data | from_json if nom_data is string else
              nom_data %} {% set nom_r = nom_data.valeur | default('En attente')
              %}

              {% set type_data = p.type if p.type is defined else {"valeur":"-"}
              %} {% set type_data = type_data | from_json if type_data is string
              else type_data %} {% set type_r = type_data.valeur | default('-')
              %}

              {% set annee_data = p.annee if p.annee is defined else
              {"valeur":"-"} %} {% set annee_data = annee_data | from_json if
              annee_data is string else annee_data %} {% set annee_r =
              annee_data.valeur | default('-') | string %}

              {% set prix_data = p.prix_moyen if p.prix_moyen is defined else
              {"valeur":"-"} %} {% set prix_data = prix_data | from_json if
              prix_data is string else prix_data %} {% set prix_r =
              prix_data.valeur | default('-') %}

              {% set abv_data = p.abv if p.abv is defined else {"valeur":"-"} %}
              {% set abv_data = abv_data | from_json if abv_data is string else
              abv_data %} {% set abv_r = abv_data.valeur | default('-') %}

              {% set vol_data = p.volume_ml if p.volume_ml is defined else
              {"valeur":"-"} %} {% set vol_data = vol_data | from_json if
              vol_data is string else vol_data %} {% set vol_r = vol_data.valeur
              | default('-') %}

              {% set profil_data = p.profil_aromatique if p.profil_aromatique is
              defined else {"valeur":"-"} %} {% set profil_data = profil_data |
              from_json if profil_data is string else profil_data %} {% set
              profil_r = (profil_data.valeur | default('-') | string) |
              replace('\\n','\n') %}

              {% set est_maison = is_state('input_boolean.bar_est_maison','on')
              %}

              {# --- Inventaire Bar (safe) --- #} {% set raw_inv =
              state_attr('sensor.bar_supersensor', 'spiritueux') | default({},
              true) %} {% set inv = raw_inv if raw_inv is mapping else (raw_inv
              | from_json if raw_inv is string and raw_inv|trim not in ['',
              'unknown', 'none'] else {}) %} {% set inv = inv if inv is mapping
              else {} %}

              {# --- 1) Gestion erreurs / états --- #} {% if
              is_state('input_boolean.bar_ia_erreur', 'on') %}
                {% if '429' in err_msg %}
                  ## <font color="#e74c3c">❌ Quota IA dépassé (429)</font>
                  Attends un peu avant de réessayer.
                {% elif '503' in err_msg %}
                  ## <font color="#e74c3c">❌ Serveur IA surchargé (503)</font>
                  Réessaie dans quelques instants.
                {% else %}
                  ## <font color="#e74c3c">❌ Erreur IA</font>
                  {{ err_msg if err_msg|trim != '' else "Réessaie plus tard." }}
                {% endif %}

              {% elif is_state('input_boolean.bar_ia_en_cours', 'on') %}
                ## <font color="#3498db">🔄 Recherche IA en cours...</font>
                Le barman analyse ta demande.

              {% elif nom_r == "En attente" %}
                ## <font color="#7f8c8d">⚪ Prêt à rechercher</font>
                Remplis les champs puis lance l'IA.

              {% else %}

                {# --- 2) Logique doublon (comme Cave) --- #}
                {% set ns = namespace(found=false) %}
                {% for id, info in inv.items() %}
                  {% if info is mapping %}
                    {% set n = (info.nom.valeur if info.nom is defined and info.nom is mapping else info.nom) | default('') | string %}
                    {% set t = (info.type.valeur if info.type is defined and info.type is mapping else info.type) | default('') | string %}
                    {% set a = (info.annee.valeur if info.annee is defined and info.annee is mapping else info.annee) | default('-') | string %}
                    {% if n|lower == nom_r|lower and t|lower == type_r|lower and a == annee_r %}
                      {% set ns.found = true %}
                    {% endif %}
                  {% endif %}
                {% endfor %}

                {% if ns.found %}
                  ## <font color="#e67e22">⚠️ Spiritueux déjà existant</font>
                {% else %}
                  ## <font color="#2ecc71">✅ Bouteille identifiée</font>
                {% endif %}

              {% endif %}

              {# --- 3) Affichage fiche (comme Cave : uniquement si résultat +
              pas en cours + pas d’erreur) --- #} {% if nom_r != "En attente"
                    and is_state('input_boolean.bar_ia_en_cours','off')
                    and is_state('input_boolean.bar_ia_erreur','off') %}

              {% if est_maison %}🏠 **Maison**{% else %}🏭 **Industriel**{%
              endif %}

              **Détails :** **🥃 Nom :** {{ nom_r }} **🧾 Type :** {{ type_r }}
              **📅 Année :** {{ annee_r }} **🌡️ ABV :** {{ abv_r }} % **🧴
              Volume :** {{ vol_r }} mL

              **👃 Profil :** {{ profil_r }}

              💰 **Prix estimé :** {{ prix_r }} € {% endif %}
          - type: entities
            title: ⚙️ Gestion Bar
            show_header_toggle: false
            entities:
              - entity: input_select.bar_selection_rangement
              - entity: input_select.bar_selection_case_rangement
              - type: button
                name: Ranger dans la case
                icon: mdi:plus-box
                tap_action:
                  action: call-service
                  service: script.bar_valider_rangement
              - type: button
                name: Vider la case
                icon: mdi:trash-can
                tap_action:
                  action: call-service
                  service: script.bar_vider_case
              - type: section
                label: Modifier l'entrée sélectionnée
              - entity: input_select.bar_selection_suppression
                name: Choisir une bouteille
          - type: horizontal-stack
            cards:
              - show_name: true
                show_icon: true
                type: button
                name: Retrait bouteille
                icon: mdi:minus-thick
                tap_action:
                  action: call-service
                  service: input_button.press
                  target:
                    entity_id: input_button.bar_decrement_stock
              - type: button
                name: Ajout bouteille
                icon: mdi:plus-thick
                tap_action:
                  action: call-service
                  service: input_button.press
                  target:
                    entity_id: input_button.bar_increment_stock
              - show_name: true
                show_icon: true
                type: button
                name: Supprimer
                icon: mdi:delete-forever
                tap_action:
                  action: call-service
                  service: input_button.press
                  target:
                    entity_id: input_button.bar_delete_selected
      - type: vertical-stack
        cards:
          - type: iframe
            url: /local/bar_plan.html?v=2.5
            aspect_ratio: 77.5%
          - type: horizontal-stack
            cards:
              - type: entities
                title: 👨‍🍸 Conseil du Barman
                entities:
                  - entity: input_select.bar_selection_suppression
                    name: Bouteille (optionnel)
                  - entity: input_select.bar_type_pour_cocktail
                    name: Type
                  - entity: input_text.bar_ingredients_disponibles
                    name: Ingrédients dispo
                  - entity: input_text.bar_plat_cocktail
                    name: Envie / occasion
                  - entity: input_button.bar_bouton_ia_cocktail
                    name: Lancer le cocktail
              - type: conditional
                conditions:
                  - entity: input_boolean.bar_ia_en_cours
                    state: 'on'
                card:
                  type: markdown
                  content: |
                    ⏳ **Le barman prépare une idée...**
                    _Deux secondes : je dose, je shake, je goûte._
              - type: conditional
                conditions:
                  - entity: input_boolean.bar_ia_en_cours
                    state: 'off'
                card:
                  type: markdown
                  content: >
                    {% if is_state('input_boolean.bar_ia_erreur', 'on') %}

                    ## ❌ Impossible de sortir un conseil

                    **Détail :** {{ states('input_text.bar_derniere_erreur_ia')
                    }}

                    {% else %}

                    {# -----------------------------
                       Récup + nettoyage + garde-fous
                       ----------------------------- #}
                    {% set raw = state_attr('sensor.ia_barman_accord',
                    'reponse') | default('', true) | string %}

                    {% set s = raw
                      | replace('```json','')
                      | replace('```','')
                      | replace('\ufeff','')
                      | replace('“','"')
                      | replace('”','"')
                      | replace("’","'")
                      | trim
                    %}

                    {% set is_json = (s[0:1] == '{') and (s[-1:] == '}') and
                    ('"cocktail"' in s) %}

                    {% if not is_json %}

                    ## 🥃 Conseil du Barman

                    _Je ne peux pas confirmer que la réponse est un JSON
                    valide._

                    **Brut :**

                    {{ s }}

                    {% else %}

                    {% set d = s | from_json %}

                    {% set cocktail = d.cocktail | default('Cocktail', true) %}
                    {% set style   = d.style   | default('', true) %} {% set
                    base    = d.base    | default('', true) %} {% set raison  =
                    d.raison  | default('', true) %} {% set verre   = d.verre  
                    | default('', true) %} {% set garnish = d.garnish |
                    default('', true) %} {% set niveau  = d.niveau  |
                    default('', true) %}

                    {% set ings    = d.ingredients if d.ingredients is defined
                    else [] %} {% set steps   = d.recette if d.recette is
                    defined else [] %} {% set alts    = d.alternatives if
                    d.alternatives is defined else [] %}

                    ## 🥃 {{ cocktail }}

                    {% if style or niveau %} **Style :** {{ style if style else
                    '—' }}{% if niveau %} • **Niveau :** {{ niveau }}{% endif %}
                    {% endif %}

                    {% if base %} **Base :** {{ base }} {% endif %}

                    {% if raison %} > _{{ raison }}_ {% endif %}

                    ---

                    ### 🍋 Ingrédients

                    {% if ings is iterable and (ings | length) > 0 %}
                      {% for it in ings %}
                        {% if it is mapping %}
                          {% set iname = it.nom | default(it.ingredient | default('Ingrédient')) %}
                          {% set iqty  = it.quantite | default(it.qty | default('')) %}
                    - **{{ iname }}**{% if iqty|string|trim != '' %} — {{ iqty
                    }}{% endif %}
                        {% else %}
                    - {{ it }}
                        {% endif %}
                      {% endfor %}
                    {% else %} - — {% endif %}

                    ### 🧊 Préparation

                    {% if steps is iterable and (steps | length) > 0 %}
                      {% for st in steps %}
                    {{ loop.index }}. {{ st }}
                      {% endfor %}
                    {% else %} 1. — {% endif %}

                    {% if verre or garnish %} ---

                    {% if verre %}**Verre :** {{ verre }}{% endif %} {% if
                    garnish %}

                    **Garnish :** {{ garnish }}{% endif %} {% endif %}

                    {% if alts is iterable and (alts | length) > 0 %} ---

                    ### 🔁 Variantes

                      {% for a in alts %}
                        {% if a is mapping %}
                          {% set aname = a.nom | default(a.name | default('Variante')) %}
                          {% set adesc = a.description | default(a.desc | default('')) %}
                    - **{{ aname }}**{% if adesc|string|trim != '' %} — {{ adesc
                    }}{% endif %}
                        {% else %}
                    - {{ a }}
                        {% endif %}
                      {% endfor %}
                    {% endif %}

                    {% endif %} {% endif %}
          - type: vertical-stack
            cards:
              - type: conditional
                conditions:
                  - condition: state
                    entity: input_select.bar_rendu_mode
                    state: Rangement Manuel
                card:
                  type: entities
                  title: 📥 Gestion Manuelle (Spiritueux)
                  show_header_toggle: false
                  entities:
                    - entity: input_select.bar_selection_rangement
                    - entity: input_select.bar_selection_case_rangement
                    - type: button
                      name: Placer la bouteille
                      icon: mdi:plus-box
                      tap_action:
                        action: call-service
                        service: script.bar_valider_rangement
                    - type: button
                      name: Vider la case
                      icon: mdi:trash-can
                      tap_action:
                        action: call-service
                        service: script.bar_vider_case
              - type: conditional
                conditions:
                  - condition: state
                    entity: input_select.bar_rendu_mode
                    state: Remplissage Automatique
                card:
                  type: horizontal-stack
                  cards:
                    - type: button
                      name: Ranger Tout
                      icon: mdi:auto-fix
                      tap_action:
                        action: call-service
                        service: script.bar_execution_auto_complete
                    - type: button
                      name: Vider Tout
                      icon: mdi:cached
                      tap_action:
                        confirmation:
                          text: Vider tout le plan ?
                        action: call-service
                        service: script.bar_vidage_complet
              - type: entities
                title: ⚙️ Configuration & Dimensions (Bar)
                show_header_toggle: false
                state_color: true
                entities:
                  - entity: input_select.bar_rendu_mode
                    name: Mode d'affichage
                  - entity: input_number.bar_nb_etageres
                  - entity: input_number.bar_nb_colonnes
              - type: horizontal-stack
                cards:
                  - type: button
                    name: Sync Liste Spiritueux
                    icon: mdi:database-sync
                    tap_action:
                      action: call-service
                      service: automation.trigger
                      target:
                        entity_id: automation.bar_sync_liste_spiritueux
                  - type: button
                    name: Forcer Visuel
                    icon: mdi:refresh
                    tap_action:
                      action: call-service
                      service: shell_command.bar_update_html
    background:
      opacity: 100
      alignment: center
      size: cover
      repeat: repeat
      attachment: fixed
      image:
        media_content_id: media-source://media_source/local/muted_background.webp
        media_content_type: image/webp
        metadata:
          title: muted_background.webp
          thumbnail: null
          media_class: image
          children_media_class: null
          navigateIds:
            - {}
            - media_content_type: app
              media_content_id: media-source://media_source
    layout:
      grid-template-columns: 23% 77%
      grid-template-rows: auto
      grid-template-areas: |
        "left right"
    title: Bar
    icon: mdi:glass-cocktail
