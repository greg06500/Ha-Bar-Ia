              {# --- emoji : vin coloré sinon bar classique --- #}
              {% set emoji =
                ('🔴' if 'rouge' in c else ('🌕' if 'blanc' in c else ('🏮' if 'ros' in c else '⚪')))
                if 'vin' in t
                else (
                  '🥃' if ('rhum' in t or 'whisk' in t or 'whisky' in t or 'bourbon' in t or 'scotch' in t)
                  else ('🍸' if 'gin' in t
                  else ('🧊' if 'vodka' in t
                  else ('🌵' if ('tequila' in t or 'mezcal' in t)
                  else ('🍯' if ('liqueur' in t or 'crème' in t or 'creme' in t)
                  else '🍾')))))
              %}
            
              {# --- label --- #}
              {% set badge = '🏠 ' if est_maison else '' %}
              {% set base_label = badge ~ emoji ~ ' ' ~ nom %}
              {% if an not in ['-', '', none] %}
                {% set base_label = base_label ~ " (" ~ an ~ ")" %}
              {% endif %}
            
              {# --- Gestion des doublons --- #}
              {% set count = ns.counts.get(base_label, 0) + 1 %}
              {% set ns.counts = dict(ns.counts, **{base_label: count}) %}
              {% set final_label = base_label if count == 1 else (base_label ~ " #" ~ count) %}
            
              {% set ns.items = ns.items + [final_label] %}
            
            {% endfor %}

              {{ ns.items }}

            {% else %}
              {{ ['Aucun'] }}
            {% endif %}

