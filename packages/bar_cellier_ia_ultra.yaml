  - alias: "IA - Recherche Spiritueux (Barman)"
    id: bar_ia_recherche_spiritueux
    mode: restart

    trigger:
      - platform: state
        entity_id: input_button.bar_bouton_ia_recherche

    action:
      - action: input_boolean.turn_off
        target: { entity_id: input_boolean.bar_ia_erreur }

      - action: input_boolean.turn_on
        target: { entity_id: input_boolean.bar_ia_en_cours }

      - variables:
          est_maison: "{{ is_state('input_boolean.bar_est_maison','on') }}"
          nom: "{{ states('input_text.bar_recherche_nom') }}"
          typ: "{{ states('input_text.bar_recherche_type') }}"
          annee: "{{ states('input_text.bar_recherche_annee') }}"
          base_utilisee: "{{ states('input_text.bar_base_alcool_utilisee') }}"
          prix_base_l: "{{ states('input_number.bar_base_prix_litre') | float(0) }}"
          volume_ml: "{{ states('input_number.bar_volume_ml_maison') | float(0) }}"
          ingredients: "{{ states('input_text.bar_ingredients_maison') | string }}"

          volume_l: "{{ volume_ml / 1000 if volume_ml > 0 else 0 }}"
          cout_base: "{{ (volume_ml / 1000) * prix_base_l if volume_ml > 0 else 0 }}"

          euros_list: "{{ ingredients | regex_findall('([0-9]+(?:[\\.,][0-9]+)?)\\s*€') }}"
          cout_ingredients: >-
            {% set ns = namespace(sum=0) %}
            {% for n in euros_list %}
              {% set ns.sum = ns.sum + (n | replace(',', '.') | float(0)) %}
            {% endfor %}
            {{ ns.sum }}

          volume_ok: "{{ volume_ml > 0 }}"
          ingredients_ok: "{{ (euros_list | length) > 0 }}"
          cout_total: "{{ cout_base + cout_ingredients }}"
          prix_conseille: "{{ (cout_total * 1.5) | round(0) }}"
          marge: "{{ (prix_conseille - cout_total) | round(2) }}"
          cout_par_litre: "{{ (cout_total / volume_l) | round(2) if volume_l > 0 else 0 }}"

          prix_sources_maison: >-
            Base: {{ cout_base | round(2) }} € | Ingrédients: {{ cout_ingredients | round(2) }} € | Total: {{ cout_total | round(2) }} € |
            Prix conseillé (x1.5): {{ prix_conseille }} € | Marge: {{ marge }} € | Coût/L: {{ cout_par_litre }} €

      - choose:

          # =========================
          # ✅ MODE MAISON : SANS IA
          # =========================
          - conditions:
              - condition: template
                value_template: "{{ est_maison }}"
            sequence:
              - variables:
                  payload_maison: >-
                    {{
                      {
                        "nom": {"valeur": (nom if nom|trim != "" else "-"), "confiance": "moyenne"},
                        "annee": {"valeur": (annee if annee|trim != "" else "-"), "confiance": "faible"},
                        "type": {"valeur": (typ if typ|trim != "" else "maison"), "confiance": "moyenne"},
                        "origine": {"valeur": "Maison", "confiance": "élevée"},
                        "marque_distillerie": {"valeur": "-", "confiance": "faible"},

                        "abv": {
                          "valeur": (states('sensor.bar_abv_maison_estime') | float(0) | round(1)),
                          "confiance": ("élevée" if states('sensor.bar_abv_maison_estime')|float(0) > 0 else "faible")
                        },

                        "volume_ml": {
                          "valeur": (volume_ml | int(0) if volume_ok else "-"),
                          "confiance": ("élevée" if volume_ok else "faible")
                        },

                        "prix_moyen": {
                          "valeur": (prix_conseille | string if (volume_ok and ingredients_ok) else "-"),
                          "sources": (
                            prix_sources_maison
                            if (volume_ok and ingredients_ok)
                            else (
                              "Je ne peux pas confirmer le volume"
                              if not volume_ok
                              else "Je ne peux pas confirmer le coût des ingrédients"
                            )
                          ),
                          "confiance": ("moyenne" if (volume_ok and ingredients_ok) else "faible")
                        },

                        "profil_aromatique": {"valeur": "-", "confiance": "faible"},
                        "corps_cocktail": {"valeur": "moyen", "raison": "-", "confiance": "faible"},
                        "cocktails": {"valeur": "-", "confiance": "faible"}
                      } | tojson
                    }}

              - event: REMPLIR_SPIRITUEUX_RECHERCHE
                event_data:
                  payload: "{{ payload_maison }}"

              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.bar_ia_en_cours

          # =========================
          # 🏭 MODE INDUSTRIEL : IA
          # =========================
          - conditions:
              - condition: template
                value_template: "{{ not est_maison }}"
            sequence:
              - action: ai_task.generate_data
                data:
                  entity_id: ai_task.google_ai_task
                  task_name: infos spiritueux
                  instructions: >-
                    Agis comme un barman expert et analyste de données. Ta réponse doit être uniquement un dictionnaire JSON pur.
                    SOURCES À CONSULTER ET CROISER (si disponibles) : Difford's Guide, Liquor.com, Imbibe, Punch, Cocktail Codex, The Oxford Companion to Spirits & Cocktails, Whisky Advocate, Rum Ratings, Gin Foundry.
        
                    Analyse : {{ states('input_text.bar_recherche_nom') }}, {{ states('input_text.bar_recherche_type') }}, {{ states('input_text.bar_recherche_annee') }}.
        
                    IMPORTANT :
                    1) Donne les champs, même si certains sont "-".
                    2) Profil aromatique : format "Famille (Détail) X%" (Total 100%). Familles autorisées : Boisé, Épicé, Fruité, Floral, Agrumes, Herbacé, Fumé, Caramel, Vanillé, Chocolaté, Noix, Céréales, Minéral, Tertiaire.
                    3) Corps de cocktail : "léger" / "moyen" / "puissant" + justification courte.
                    4) Cocktails conseillés : liste courte (5 max) avec ingrédients principaux.
        
                    STRUCTURE JSON OBLIGATOIRE :
                    {
                      "nom": {"valeur": "...", "confiance": "..."},
                      "annee": {"valeur": "-", "confiance": "..."},
                      "type": {"valeur": "...", "confiance": "..."},
                      "origine": {"valeur": "...", "confiance": "..."},
                      "marque_distillerie": {"valeur": "...", "confiance": "..."},
                      "abv": {"valeur": "40", "confiance": "..."},
                      "volume_ml": {"valeur": "700", "confiance": "..."},
                      "prix_moyen": {"valeur": "35", "sources": "...", "confiance": "..."},
                      "profil_aromatique": {"valeur": "...", "confiance": "..."},
                      "corps_cocktail": {"valeur": "moyen", "raison": "...", "confiance": "..."},
                      "cocktails": {"valeur": "1) ...\\n2) ...", "confiance": "..."}
                    }
                response_variable: bar_ai_result
        
              - if:
                  - condition: template
                    value_template: "{{ bar_ai_result.data is defined and bar_ai_result.data | length > 40 }}"
                then:
                  - event: REMPLIR_SPIRITUEUX_RECHERCHE
                    event_data:
                      payload: >
                        {% set clean = bar_ai_result.data | replace('```json','') | replace('```','') | trim %}
                        {{ clean }}
                else:
                  - action: input_boolean.turn_on
                    target: { entity_id: input_boolean.bar_ia_erreur }
        
              - action: input_boolean.turn_off
                target: { entity_id: input_boolean.bar_ia_en_cours }

          
  # Capture erreurs IA
  - alias: "Système - Capture Erreur IA (Bar)"
    id: bar_capture_erreur_ia
    trigger:
      - platform: event
        event_type: system_log_event
    condition:
      - condition: template
        value_template: >
          {% set msg = (trigger.event.data.message | default('') | string) | lower %}
          {{ 'google' in msg or '429' in msg or '503' in msg }}
    action:
      - service: input_boolean.turn_on
        target: { entity_id: input_boolean.bar_ia_erreur }
      - service: input_boolean.turn_off
        target: { entity_id: input_boolean.bar_ia_en_cours }
      - service: input_text.set_value
        target: { entity_id: input_text.bar_derniere_erreur_ia }
        data:
          value: >
            {{ (trigger.event.data.message | default('Erreur') | string)[:250] }}


  # Ajouter la recherche IA à l'inventaire (avec infos "maison" + reset recherche)
  - alias: "Bar - Ajouter recherche à l'inventaire"
    id: bar_ajouter_recherche
    mode: queued
    trigger:
      - platform: state
        entity_id: input_button.bar_copy_recherche_to_inventory

    action:
      - variables:
          raw_current: "{{ state_attr('sensor.bar_supersensor', 'spiritueux') | default({}, true) }}"
          current: "{{ raw_current if raw_current is mapping else (raw_current | from_json if raw_current is string and raw_current|trim not in ['', 'unknown', 'none'] else {}) }}"

          payload_raw: "{{ state_attr('sensor.bar_spiritueux_recherche', 'payload') | default({}, true) }}"
          d: >-
            {% if payload_raw is mapping %}
              {{ payload_raw }}
            {% elif payload_raw is string and payload_raw|trim not in ['', 'unknown', 'none'] %}
              {% set s = payload_raw | replace('```json','') | replace('```','') | trim %}
              {{ s | from_json }}
            {% else %}
              {{ {} }}
            {% endif %}

          sid: "spirit_{{ now().strftime('%Y%m%d_%H%M%S') }}"

          est_maison: "{{ is_state('input_boolean.bar_est_maison','on') }}"
          base_utilisee: "{{ states('input_text.bar_base_alcool_utilisee') | string }}"
          ingredients: "{{ states('input_text.bar_ingredients_maison') | string }}"
          prix_base_l: "{{ states('input_number.bar_base_prix_litre') | float(0) }}"
          volume_ml_maison: "{{ states('input_number.bar_volume_ml_maison') | float(0) }}"
          volume_l_maison: "{{ (volume_ml_maison / 1000) if volume_ml_maison > 0 else 0 }}"

          # --- ABV Maison (entrées + capteurs calculés)
          abv_base_pct: "{{ states('input_number.bar_maison_abv_base') | float(0) }}"
          volume_base_ml: "{{ states('input_number.bar_maison_volume_base_ml') | float(0) }}"
          volume_eau_ml: "{{ states('input_number.bar_maison_volume_eau_ml') | float(0) }}"
          sucre_g: "{{ states('input_number.bar_maison_sucre_g') | float(0) }}"
          coef_sucre: "{{ states('input_number.bar_maison_coef_sucre_ml_par_g') | float(0) }}"
          volume_final_estime_ml: "{{ states('sensor.bar_volume_final_estime') | float(0) }}"
          abv_final_estime_pct: "{{ states('sensor.bar_abv_maison_estime') | float(0) }}"

          # --- coûts ingrédients maison
          euros_list: "{{ ingredients | regex_findall('([0-9]+(?:[\\.,][0-9]+)?)\\s*€') }}"
          cout_ingredients: >-
            {% set ns = namespace(sum=0) %}
            {% for n in euros_list %}
              {% set ns.sum = ns.sum + (n | replace(',', '.') | float(0)) %}
            {% endfor %}
            {{ ns.sum | round(2) }}

          volume_ok: "{{ volume_ml_maison > 0 }}"
          ingredients_ok: "{{ (euros_list | length) > 0 }}"
          base_ok: "{{ prix_base_l > 0 }}"

          cout_base: "{{ (volume_l_maison * prix_base_l) | round(2) if volume_l_maison > 0 else 0 }}"
          cout_total: "{{ (cout_base + cout_ingredients) | round(2) }}"
          prix_conseille: "{{ (cout_total * 1.5) | round(0) }}"
          marge: "{{ (prix_conseille - cout_total) | round(2) }}"
          cout_par_litre: "{{ (cout_total / volume_l_maison) | round(2) if volume_l_maison > 0 else 0 }}"

          maison_obj: >-
            {% if est_maison %}
              {{ {
                "est_maison": true,

                "base_utilisee": base_utilisee,
                "ingredients": ingredients,

                "volume_bouteille_ml": volume_ml_maison,
                "prix_base_eur_litre": prix_base_l,

                "cout_base": cout_base,
                "cout_ingredients": cout_ingredients,
                "cout_total": cout_total,
                "prix_conseille": prix_conseille,
                "marge": marge,
                "cout_par_litre": cout_par_litre,

                "volume_ok": volume_ok,
                "ingredients_ok": ingredients_ok,
                "base_ok": base_ok,

                "abv_base_pct": abv_base_pct,
                "volume_base_ml": volume_base_ml,
                "volume_eau_ml": volume_eau_ml,
                "sucre_g": sucre_g,
                "coef_sucre_ml_par_g": coef_sucre,

                "volume_final_estime_ml": volume_final_estime_ml,
                "abv_final_estime_pct": abv_final_estime_pct
              } }}
            {% else %}
              {{ {"est_maison": false} }}
            {% endif %}

      - if:
          - condition: template
            value_template: >
              {{ d is mapping and d|count > 0 and d.nom is defined }}
        then:
          - variables:
              new_item: >-
                {{
                  {
                    'nom': d['nom'],
                    'annee': d['annee'],
                    'type': d['type'],
                    'origine': d['origine'],
                    'marque_distillerie': d['marque_distillerie'],

                    
                    'abv': (
                      {
                        "valeur": (abv_final_estime_pct | float(0) | round(1)),
                        "confiance": ("élevée" if (abv_final_estime_pct | float(0)) > 0 else "faible")
                      }
                      if est_maison
                      else d['abv']
                    ),

                    'volume_ml': d['volume_ml'],
                    'prix_moyen': d['prix_moyen'],
                    'profil_aromatique': d['profil_aromatique'],
                    'corps_cocktail': d['corps_cocktail'],
                    'cocktails': d['cocktails'],
                    'maison': maison_obj,
                    'nombre_bouteilles': 1
                  }
                }}
              new_collection: "{{ dict(current, **{sid: new_item}) }}"
              inventory_json: "{{ new_collection | tojson }}"

          - event: UPDATE_BAR_FINAL
            event_data:
              new_collection: "{{ inventory_json }}"

          - service: shell_command.bar_save_inventory
            data:
              inventory_json: "{{ inventory_json }}"

          - service: shell_command.bar_update_html

          # Reset états IA (optionnel mais propre)
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.bar_ia_en_cours

          # ✅ Reset recherche comme la Cave
          - event: VIDER_SPIRITUEUX_RECHERCHE

        else:
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.bar_ia_erreur
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.bar_ia_en_cours

  - alias: "Bar - Ajuster Stock"
    id: bar_ajuster_stock
    trigger:
      - platform: state
        entity_id:
          - input_button.bar_increment_stock
          - input_button.bar_decrement_stock
    action:
      - variables:
          selection_label: "{{ states('input_select.bar_selection_suppression') }}"
          diff: "{{ 1 if trigger.entity_id == 'input_button.bar_increment_stock' else -1 }}"
          raw: "{{ state_attr('sensor.bar_supersensor', 'spiritueux') | default({}, true) }}"
          bar: "{{ raw if raw is mapping else (raw | from_json if raw is string else {}) }}"

          target_id: >
              {% set base = selection_label %}
              {% set idx = 1 %}
              {% if ' #' in selection_label %}
                {% set base = selection_label.rsplit(' #', 1)[0] %}
                {% set idx = selection_label.rsplit(' #', 1)[1] | int(1) %}
              {% endif %}
            
              {% set ns = namespace(found='', count=0) %}
            
              {% if bar is mapping and selection_label not in ['Aucun', '', none] %}
                {% for id, info in bar.items() %}
            
                  {# --- type / nom / année --- #}
                  {% set t = (info.type.valeur if info.type is mapping and info.type.valeur is defined else info.type) | default('') | string | lower %}
                  {% set nom = (info.nom.valeur if info.nom is mapping else info.nom) | default('Sans nom') %}
                  {% set an  = (info.annee.valeur if info.annee is mapping else info.annee) | default('-') %}
            
                  {# --- maison (robuste) --- #}
                  {% set est_maison = false %}
                  {% if info.maison is defined %}
                    {% if info.maison is mapping and info.maison.est_maison is defined %}
                      {% set est_maison = info.maison.est_maison %}
                    {% elif info.maison is string and info.maison|trim not in ['', 'none', 'unknown'] %}
                      {% set m = info.maison | from_json %}
                      {% if m is mapping and m.est_maison is defined %}
                        {% set est_maison = m.est_maison %}
                      {% endif %}
                    {% endif %}
                  {% endif %}
            
                  {# --- couleur vin (si type=vin) --- #}
                  {% set c = '' %}
                  {% if 'vin' in t and info.couleur is defined %}
                    {% if info.couleur is mapping and info.couleur.valeur is defined %}
                      {% set c = info.couleur.valeur | string | lower %}
                    {% else %}
                      {% set c = info.couleur | string | lower %}
                    {% endif %}
                  {% endif %}
            
                  {# --- emoji --- #}
                  {% set emoji =
                    ('🔴' if 'rouge' in c else ('🌕' if 'blanc' in c else ('🏮' if 'ros' in c else '⚪')))
                    if 'vin' in t
                    else (
                      '🥃' if ('rhum' in t or 'whisk' in t or 'whisky' in t or 'bourbon' in t or 'scotch' in t)
                      else ('🍸' if 'gin' in t
                      else ('🧊' if 'vodka' in t
                      else ('🌵' if ('tequila' in t or 'mezcal' in t)
                      else ('🍯' if ('liqueur' in t or 'crème' in t or 'creme' in t)
                      else '🍾')))))
                  %}
            
                  {# --- label identique à l'input_select (sans le #n) --- #}
                  {% set badge = '🏠 ' if est_maison else '' %}
                  {% set label = badge ~ emoji ~ ' ' ~ nom %}
                  {% if an not in ['-', '', none] %}
                    {% set label = label ~ ' (' ~ an ~ ')' %}
                  {% endif %}
            
                  {# --- match avec base + index (#2, #3...) --- #}
                  {% if label == base %}
                    {% set ns.count = ns.count + 1 %}
                    {% if ns.count == idx %}
                      {% set ns.found = id %}
                    {% endif %}
                  {% endif %}
            
                {% endfor %}
              {% endif %}
            
              {{ ns.found }}

          new_collection: >
            {% set ns = namespace(new_dict={}) %}
            {% if bar is mapping %}
              {% for key, val in bar.items() %}
                {% if key == target_id %}
                  {% set count = [0, (val.nombre_bouteilles | default(0) | int(0) + diff)] | max %}
                  {% set ns.new_dict = dict(ns.new_dict, **{key: dict(val, **{'nombre_bouteilles': count})}) %}
                {% else %}
                  {% set ns.new_dict = dict(ns.new_dict, **{key: val}) %}
                {% endif %}
              {% endfor %}
            {% endif %}
            {{ ns.new_dict }}

      - if:
          - condition: template
            value_template: "{{ target_id != '' and bar is mapping and target_id in bar }}"
        then:
          - event: UPDATE_BAR_FINAL
            event_data:
              new_collection: "{{ new_collection | tojson }}"
          - service: shell_command.bar_update_html
          - service: shell_command.bar_save_inventory
            data:
              inventory_json: "{{ new_collection | tojson }}"

  # Supprimer entrée
  - alias: "Bar - Supprimer Spiritueux"
    id: bar_delete_entry
    trigger:
      - platform: state
        entity_id: input_button.bar_delete_selected
    action:
      - variables:
          selection_label: "{{ states('input_select.bar_selection_suppression') }}"
          raw: "{{ state_attr('sensor.bar_supersensor', 'spiritueux') | default({}, true) }}"
          bar: "{{ raw if raw is mapping else (raw | from_json if raw is string else {}) }}"
          
          target_id: >
            {% set base = selection_label %}
            {% set idx = 1 %}
            {% if ' #' in selection_label %}
              {% set base = selection_label.rsplit(' #', 1)[0] %}
              {% set idx = selection_label.rsplit(' #', 1)[1] | int(1) %}
            {% endif %}
            {% set ns = namespace(found='', count=0) %}

            {% if bar is mapping and selection_label not in ['Aucun', '', none] %}
              {% for id, info in bar.items() %}

                {% set t = (info.type.valeur if info.type is mapping else info.type) | default('') | string | lower %}
                {% set nom = (info.nom.valeur if info.nom is mapping else info.nom) | default('Sans nom') %}
                {% set an = (info.annee.valeur if info.annee is mapping else info.annee) | default('-') %}

                {% set est_maison = false %}
                {% if info.maison is defined %}
                  {% if info.maison is mapping and info.maison.est_maison is defined %}
                    {% set est_maison = info.maison.est_maison %}
                  {% elif info.maison is string and info.maison|trim not in ['', 'none', 'unknown'] %}
                    {% set m = info.maison | from_json %}
                    {% if m is mapping and m.est_maison is defined %}
                      {% set est_maison = m.est_maison %}
                    {% endif %}
                  {% endif %}
                {% endif %}

                {# --- couleur vin (si type = vin) --- #}
                {% set c = '' %}
                {% if 'vin' in t and info.couleur is defined %}
                  {% if info.couleur is mapping and info.couleur.valeur is defined %}
                    {% set c = info.couleur.valeur | string | lower %}
                  {% else %}
                    {% set c = info.couleur | string | lower %}
                  {% endif %}
                {% endif %}
                
                {# --- emoji : vin coloré sinon bar classique --- #}
                {% set emoji =
                  ('🔴' if 'rouge' in c else ('🌕' if 'blanc' in c else ('🏮' if 'ros' in c else '⚪')))
                  if 'vin' in t
                  else (
                    '🥃' if ('rhum' in t or 'whisk' in t or 'whisky' in t or 'bourbon' in t or 'scotch' in t)
                    else ('🍸' if 'gin' in t
                    else ('🧊' if 'vodka' in t
                    else ('🌵' if ('tequila' in t or 'mezcal' in t)
                    else ('🍯' if ('liqueur' in t or 'crème' in t or 'creme' in t)
                    else '🍾')))))
                %}
                
                {% set badge = '🏠 ' if est_maison else '' %}
                {% set label = badge ~ emoji ~ ' ' ~ nom %}
                {% if an not in ['-', '', none] %}
                  {% set label = label ~ " (" ~ an ~ ")" %}
                {% endif %}

                {% if label == base %}
                  {% set ns.count = ns.count + 1 %}
                  {% if ns.count == idx %}
                    {% set ns.found = id %}
                  {% endif %}
                {% endif %}

              {% endfor %}
            {% endif %}
            {{ ns.found }}

          new_collection: >
            {% set ns = namespace(new_dict={}) %}
            {% if bar is mapping %}
              {% for key, val in bar.items() %}
                {% if key != target_id %}
                  {% set ns.new_dict = dict(ns.new_dict, **{key: val}) %}
                {% endif %}
              {% endfor %}
            {% endif %}
            {{ ns.new_dict }}

      - if:
          - condition: template
            value_template: "{{ target_id != '' and bar is mapping and target_id in bar }}"
        then:
          - event: UPDATE_BAR_FINAL
            event_data:
              new_collection: "{{ new_collection | tojson }}"
          - service: input_select.select_option
            target:
              entity_id: input_select.bar_selection_suppression
            data:
              option: "Aucun"
          - service: shell_command.bar_update_html
          - service: shell_command.bar_save_inventory
            data:
              inventory_json: "{{ new_collection | tojson }}"

  # -----------------
  # PLAN — RANGEMENT (événements)
  # -----------------
  - alias: "Bar - Rangement Manuel (Valider)"
    id: bar_rangement_valider
    trigger:
      - platform: event
        event_type: BAR_VALIDER_RANGEMENT
    action:
      - service: shell_command.bar_script_ranger
        data:
          case: "{{ states('input_select.bar_selection_case_rangement') }}"
          spirit: "{{ states('input_select.bar_selection_rangement') }}"
      - service: shell_command.bar_update_html
      - service: homeassistant.update_entity
        target:
          entity_id: sensor.bar_stock_monitor

  - alias: "Bar - Vider Case"
    id: bar_rangement_vider_case
    trigger:
      - platform: event
        event_type: BAR_VIDER_CASE
    action:
      - service: shell_command.bar_script_vider
        data:
          case: "{{ states('input_select.bar_selection_case_rangement') }}"
      - service: shell_command.bar_update_html
      - service: homeassistant.update_entity
        target:
          entity_id: sensor.bar_stock_monitor

  - alias: "Bar - Remplissage Automatique"
    id: bar_autofill
    trigger:
      - platform: event
        event_type: BAR_AUTOFILL
    action:
      - service: shell_command.bar_run_autofill
      - delay: "00:00:01"
      - service: shell_command.bar_update_html
      - service: homeassistant.update_entity
        target:
          entity_id: sensor.bar_stock_monitor

  - alias: "Bar - Vider Tout"
    id: bar_empty_all
    trigger:
      - platform: event
        event_type: BAR_EMPTY_ALL
    action:
      - service: shell_command.bar_run_empty
      - delay: "00:00:01"
      - service: shell_command.bar_update_html
      - service: homeassistant.update_entity
        target:
          entity_id: sensor.bar_stock_monitor

# -----------------
# SCRIPTS (COMME LA CAVE)
# -----------------
script:
  bar_valider_rangement:
    alias: "Bar - Ranger dans la case"
    sequence:

      - service: shell_command.bar_script_ranger
        data:
          case: "{{ states('input_select.bar_selection_case_rangement') }}"
          spirit: "{{ states('input_select.bar_selection_rangement') }}"

      - service: shell_command.bar_update_html

      - service: homeassistant.update_entity
        target:
          entity_id: sensor.bar_stock_monitor

  bar_vider_case:
    alias: "Bar - Vider la case"
    sequence:

      - service: shell_command.bar_script_vider
        data:
          case: "{{ states('input_select.bar_selection_case_rangement') }}"

      - service: shell_command.bar_update_html

      - service: homeassistant.update_entity
        target:
          entity_id: sensor.bar_stock_monitor

  bar_autofill:
    alias: "Bar - Remplissage Automatique"
    icon: mdi:auto-fix
    sequence:
      - service: shell_command.bar_run_autofill
      - delay: "00:00:01"
      - service: shell_command.bar_update_html
      - service: homeassistant.update_entity
        target:
          entity_id: sensor.bar_stock_monitor

  bar_empty_all:
    alias: "Bar - Vider tout le plan"
    icon: mdi:notification-clear-all
    sequence:
      - service: shell_command.bar_run_empty
      - delay: "00:00:01"
      - service: shell_command.bar_update_html
      - service: homeassistant.update_entity
        target:
          entity_id: sensor.bar_stock_monitor