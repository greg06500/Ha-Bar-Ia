# ----------------------------------------------------------------
# PACKAGE : BAR CELLlER IA (SPIRITUEUX) — ULTRA — Style 3 (Speakeasy)
# ----------------------------------------------------------------

# -----------------
# ENTRÉES (IA)
# -----------------
input_text:
  bar_plan_version:
    name: Bar Plan Version
    max: 32
  bar_ingredients_disponibles:
    name: "Ingrédients disponibles"
    max: 255
    icon: mdi:fruit-cherries
  bar_recherche_nom:
    name: "Nom du Spiritueux"
    max: 255
    icon: mdi:magnify
  bar_recherche_type:
    name: "Type (rhum, gin, liqueur...)"
    max: 255
    icon: mdi:glass-cocktail
  bar_recherche_annee:
    name: "Année (optionnel)"
    max: 10
    icon: mdi:calendar
  bar_plat_cocktail:
    name: "Cocktail / envie / occasion"
    max: 255
    icon: mdi:glass-mug-variant
  bar_spiritueux_convoite:
    name: "Bouteille à tester"
    max: 255
    icon: mdi:cart-search
  bar_spiritueux_highlight:
    name: "Spiritueux identifié par l'IA"
    max: 255
    icon: mdi:target
  bar_derniere_erreur_ia:
    name: "Dernière Erreur IA"
    max: 255
    
  bar_base_alcool_utilisee:
    name: "Base utilisée (ex: Charrette, Vodka, Tequila...)"
    max: 50
    
  bar_ingredients_maison:
    name: "Fruits & ingrédients (maison)"
    max: 255
    icon: mdi:fruit-cherries

input_number:
  bar_maison_abv_base:
    name: ABV alcool
    min: 0
    max: 96
    step: 0.1
    unit_of_measurement: "%"
    mode: box
  bar_maison_volume_base_ml:
    name: Alcool
    min: 0
    max: 5000
    step: 1
    unit_of_measurement: "mL"
    mode: box
  bar_maison_volume_eau_ml:
    name: Eau ajoutée
    min: 0
    max: 5000
    step: 1
    unit_of_measurement: "mL"
    mode: box
  bar_maison_sucre_g:
    name: Sucre ajouté
    min: 0
    max: 5000
    step: 1
    unit_of_measurement: "g"
    mode: box
  bar_maison_coef_sucre_ml_par_g:
    name: Coef sucre (mL par g)
    min: 0.0
    max: 2.0
    step: 0.01
    unit_of_measurement: "mL/g"
    initial: 0.62
    mode: box
  bar_volume_ml_maison:
    name: "Volume bouteille (ml)"
    min: 100
    max: 2000
    step: 50
    initial: 700
    unit_of_measurement: "ml"
    icon: mdi:bottle-soda
    mode: box
  bar_budget_max_achat:
    name: "Budget Max / Bouteille"
    min: 10
    max: 500
    step: 5
    unit_of_measurement: "€"
    icon: mdi:cash-multiple
    mode: box
  bar_nb_etageres:
    name: "Nombre d'étagères"
    min: 1
    max: 30
    step: 1
    initial: 5
    icon: mdi:view-dashboard
    mode: box

  bar_nb_colonnes:
    name: "Nombre de colonnes"
    min: 1
    max: 12
    step: 1
    initial: 4
    icon: mdi:view-column
    mode: box

    
  bar_base_prix_litre:
    name: "Prix base €/L"
    min: 0
    max: 200
    step: 0.1
    mode: box

input_button:
  bar_bouton_ia_recherche:
    name: "Lancer IA (Fiche bouteille)"
    icon: mdi:robot
  bar_bouton_ia_cocktail:
    name: "Lancer IA (Cocktail)"
    icon: mdi:shaker
  bar_bouton_ia_audit:
    name: "Analyser Stratégie Bar"
    icon: mdi:finance
  bar_bouton_ia_test_achat:
    name: "Vérifier opportunité"
    icon: mdi:scale-balance

  bar_copy_recherche_to_inventory:
    name: "Ajouter à l'inventaire"
    icon: mdi:plus-box

  bar_increment_stock:
    name: "+ 1"
    icon: mdi:plus
  bar_decrement_stock:
    name: "- 1"
    icon: mdi:minus
  bar_delete_selected:
    name: "Supprimer"
    icon: mdi:trash-can

input_boolean:
  bar_ia_en_cours:
    name: "IA en cours"
    icon: mdi:robot-confused
  bar_ia_erreur:
    name: "Erreur IA"
    icon: mdi:alert-circle
  bar_est_maison:
    name: "Bouteille maison ?"
    icon: mdi:home

# -----------------
# INVENTAIRE + SÉLECTION
# -----------------
input_select:
  bar_type_pour_cocktail:
    name: "Type d’alcool"
    options:
      - "Aucun"
      - "Rhum"
      - "Gin"
      - "Vodka"
      - "Whisky"
      - "Tequila / Mezcal"
      - "Liqueur"
      - "Vin"

  bar_selection_suppression:
    name: "Choisir un spiritueux"
    options: ["Aucun"]
    icon: mdi:bottle-tonic

  # Plan (rangement)
  bar_rendu_mode:
    name: "Mode d'affichage"
    options:
      - "Rangement Manuel"
      - "Remplissage Automatique"
    icon: mdi:auto-fix

  bar_selection_rangement:
    name: "Spiritueux à ranger"
    options:
      - "Chargement..."
    icon: mdi:bottle-tonic

  bar_selection_case_rangement:
    name: "Case cible"
    options:
      - "E1-1"
    icon: mdi:grid

# -----------------
# SCRIPTS SYSTÈME
# -----------------
shell_command:
  bar_script_ranger: 'python3 /config/python_scripts/bar_ranger.py "{{ case }}" "{{ spirit }}"'
  bar_script_vider: 'python3 /config/python_scripts/bar_ranger.py "{{ case }}" "none"'
  bar_update_html: 'python3 /config/generate_bar_plan.py'
  bar_run_autofill: 'python3 /config/python_scripts/bar_autofill.py'
  bar_run_empty: 'python3 /config/python_scripts/bar_empty.py'

# -----------------
# MONITORING STOCK
# -----------------
command_line:
  - sensor:
      name: "Bar Stock Monitor"
      unique_id: bar_stock_monitor
      command: "python3 /config/python_scripts/analyze_bar_stock.py"
      value_template: "{{ value_json.total_plan }}"
      json_attributes:
        - total_inv
        - total_plan
        - details
        - spiritueux
      scan_interval: 10

# -----------------
# TEMPLATES (capteurs)
# -----------------
template:
  - sensor:
      - name: bar_plan_iframe_url
        state: "/local/bar_plan.html?v={{ states('input_text.bar_plan_version') }}"
      - name: "Volume Final"
        unique_id: bar_volume_final_estime
        unit_of_measurement: "mL"
        icon: mdi:cup-water
        state: >
          {% set v_base = states('input_number.bar_maison_volume_base_ml') | float(0) %}
          {% set v_eau  = states('input_number.bar_maison_volume_eau_ml') | float(0) %}
          {% set sucre_g = states('input_number.bar_maison_sucre_g') | float(0) %}
          {% set coef = states('input_number.bar_maison_coef_sucre_ml_par_g') | float(0.62) %}

          {# volume sucre (approx) #}
          {% set v_sucre = sucre_g * coef %}

          {% set total = v_base + v_eau + v_sucre %}
          {{ total | round(0) }}
      # -----------------------------
      # MAISON vs INDUSTRIEL (NB)
      # -----------------------------
      - name: "Bar Bouteilles Maison"
        unique_id: bar_bouteilles_maison
        unit_of_measurement: "btls"
        icon: mdi:home
        state: >
          {% set raw = state_attr('sensor.bar_supersensor', 'spiritueux') %}
          {% set bar = raw if raw is mapping else (raw | from_json if raw is string and raw|trim not in ['', 'none', 'unknown'] else {}) %}
          {% set ns = namespace(total=0) %}
          {% if bar is mapping %}
            {% for id, v in bar.items() %}
              {% set maison = v.maison if v is mapping and v.maison is defined else {} %}
              {% if maison is string %}{% set maison = maison | from_json %}{% endif %}
              {% set is_maison = (maison is mapping and maison.est_maison is defined and maison.est_maison) %}
              {% if is_maison %}
                {% set ns.total = ns.total + (v.nombre_bouteilles | int(0)) %}
              {% endif %}
            {% endfor %}
          {% endif %}
          {{ ns.total }}

      - name: "Bar Bouteilles Industrielles"
        unique_id: bar_bouteilles_industrielles
        unit_of_measurement: "btls"
        icon: mdi:factory
        state: >
          {% set total = states('sensor.bar_nombre_de_bouteilles') | int(0) %}
          {% set maison = states('sensor.bar_bouteilles_maison') | int(0) %}
          {{ [0, total - maison] | max }}

      # -----------------------------
      # MAISON vs INDUSTRIEL (VALEUR €)
      # -----------------------------
      - name: "Bar Valeur Maison"
        unique_id: bar_valeur_maison
        unit_of_measurement: "€"
        icon: mdi:home-currency-usd
        state: >
          {% set raw = state_attr('sensor.bar_supersensor', 'spiritueux') %}
          {% set bar = raw if raw is mapping else (raw | from_json if raw is string and raw|trim not in ['', 'none', 'unknown'] else {}) %}
          {% set ns = namespace(val=0) %}
          {% if bar is mapping %}
            {% for id, v in bar.items() %}
              {% set maison = v.maison if v is mapping and v.maison is defined else {} %}
              {% if maison is string %}{% set maison = maison | from_json %}{% endif %}
              {% set is_maison = (maison is mapping and maison.est_maison is defined and maison.est_maison) %}
              {% if is_maison %}
                {% set qte = v.nombre_bouteilles | int(0) %}
                {% set pm = (v.prix_moyen.valeur if v.prix_moyen is mapping and v.prix_moyen.valeur is defined else v.prix_moyen) %}
                {% set prix = pm | float(0) %}
                {% set ns.val = ns.val + (prix * qte) %}
              {% endif %}
            {% endfor %}
          {% endif %}
          {{ ns.val | round(0) }}

      - name: "Bar Valeur Industrielle"
        unique_id: bar_valeur_industrielle
        unit_of_measurement: "€"
        icon: mdi:factory
        state: >
          {% set total = states('sensor.bar_valeur_totale') | float(0) %}
          {% set maison = states('sensor.bar_valeur_maison') | float(0) %}
          {{ (total - maison) | round(0) }}

      # -----------------------------
      # COMPTEURS PAR TYPE (NB)
      # -----------------------------
      - name: "Bar Bouteilles Rhum"
        unique_id: bar_bouteilles_rhum
        unit_of_measurement: "btls"
        icon: mdi:bottle-tonic
        state: >
          {% set raw = state_attr('sensor.bar_supersensor', 'spiritueux') %}
          {% set bar = raw if raw is mapping else (raw | from_json if raw is string and raw|trim not in ['', 'none', 'unknown'] else {}) %}
          {% set ns = namespace(total=0) %}
          {% if bar is mapping %}
            {% for id, v in bar.items() %}
              {% set t = (v.type.valeur if v.type is mapping and v.type.valeur is defined else v.type) | default('') | string | lower %}
              {% if 'rhum' in t %}
                {% set ns.total = ns.total + (v.nombre_bouteilles | int(0)) %}
              {% endif %}
            {% endfor %}
          {% endif %}
          {{ ns.total }}

      - name: "Bar Bouteilles Whisky"
        unique_id: bar_bouteilles_whisky
        unit_of_measurement: "btls"
        icon: mdi:bottle-tonic
        state: >
          {% set raw = state_attr('sensor.bar_supersensor', 'spiritueux') %}
          {% set bar = raw if raw is mapping else (raw | from_json if raw is string and raw|trim not in ['', 'none', 'unknown'] else {}) %}
          {% set ns = namespace(total=0) %}
          {% if bar is mapping %}
            {% for id, v in bar.items() %}
              {% set t = (v.type.valeur if v.type is mapping and v.type.valeur is defined else v.type) | default('') | string | lower %}
              {% if 'whisk' in t or 'bourbon' in t or 'scotch' in t %}
                {% set ns.total = ns.total + (v.nombre_bouteilles | int(0)) %}
              {% endif %}
            {% endfor %}
          {% endif %}
          {{ ns.total }}

      - name: "Bar Bouteilles Gin"
        unique_id: bar_bouteilles_gin
        unit_of_measurement: "btls"
        icon: mdi:glass-cocktail
        state: >
          {% set raw = state_attr('sensor.bar_supersensor', 'spiritueux') %}
          {% set bar = raw if raw is mapping else (raw | from_json if raw is string and raw|trim not in ['', 'none', 'unknown'] else {}) %}
          {% set ns = namespace(total=0) %}
          {% if bar is mapping %}
            {% for id, v in bar.items() %}
              {% set t = (v.type.valeur if v.type is mapping and v.type.valeur is defined else v.type) | default('') | string | lower %}
              {% if 'gin' in t %}
                {% set ns.total = ns.total + (v.nombre_bouteilles | int(0)) %}
              {% endif %}
            {% endfor %}
          {% endif %}
          {{ ns.total }}

      - name: "Bar Bouteilles Vodka"
        unique_id: bar_bouteilles_vodka
        unit_of_measurement: "btls"
        icon: mdi:cup-water
        state: >
          {% set raw = state_attr('sensor.bar_supersensor', 'spiritueux') %}
          {% set bar = raw if raw is mapping else (raw | from_json if raw is string and raw|trim not in ['', 'none', 'unknown'] else {}) %}
          {% set ns = namespace(total=0) %}
          {% if bar is mapping %}
            {% for id, v in bar.items() %}
              {% set t = (v.type.valeur if v.type is mapping and v.type.valeur is defined else v.type) | default('') | string | lower %}
              {% if 'vodka' in t %}
                {% set ns.total = ns.total + (v.nombre_bouteilles | int(0)) %}
              {% endif %}
            {% endfor %}
          {% endif %}
          {{ ns.total }}

      - name: "Bar Bouteilles Tequila/Mezcal"
        unique_id: bar_bouteilles_tequila_mezcal
        unit_of_measurement: "btls"
        icon: mdi:cactus
        state: >
          {% set raw = state_attr('sensor.bar_supersensor', 'spiritueux') %}
          {% set bar = raw if raw is mapping else (raw | from_json if raw is string and raw|trim not in ['', 'none', 'unknown'] else {}) %}
          {% set ns = namespace(total=0) %}
          {% if bar is mapping %}
            {% for id, v in bar.items() %}
              {% set t = (v.type.valeur if v.type is mapping and v.type.valeur is defined else v.type) | default('') | string | lower %}
              {% if 'tequila' in t or 'mezcal' in t %}
                {% set ns.total = ns.total + (v.nombre_bouteilles | int(0)) %}
              {% endif %}
            {% endfor %}
          {% endif %}
          {{ ns.total }}

      - name: "Bar Bouteilles Liqueurs"
        unique_id: bar_bouteilles_liqueurs
        unit_of_measurement: "btls"
        icon: mdi:bee
        state: >
          {% set raw = state_attr('sensor.bar_supersensor', 'spiritueux') %}
          {% set bar = raw if raw is mapping else (raw | from_json if raw is string and raw|trim not in ['', 'none', 'unknown'] else {}) %}
          {% set ns = namespace(total=0) %}
          {% if bar is mapping %}
            {% for id, v in bar.items() %}
              {% set t = (v.type.valeur if v.type is mapping and v.type.valeur is defined else v.type) | default('') | string | lower %}
              {% if 'liqueur' in t or 'crème' in t or 'creme' in t %}
                {% set ns.total = ns.total + (v.nombre_bouteilles | int(0)) %}
              {% endif %}
            {% endfor %}
          {% endif %}
          {{ ns.total }}

      - name: "Bar Bouteilles Vin"
        unique_id: bar_bouteilles_vin
        unit_of_measurement: "btls"
        icon: mdi:glass-wine
        state: >
          {% set raw = state_attr('sensor.bar_supersensor', 'spiritueux') %}
          {% set bar = raw if raw is mapping else (raw | from_json if raw is string and raw|trim not in ['', 'none', 'unknown'] else {}) %}
          {% set ns = namespace(total=0) %}
          {% if bar is mapping %}
            {% for id, v in bar.items() %}
              {% set t = (v.type.valeur if v.type is mapping and v.type.valeur is defined else v.type) | default('') | string | lower %}
              {% if 'vin' in t %}
                {% set ns.total = ns.total + (v.nombre_bouteilles | int(0)) %}
              {% endif %}
            {% endfor %}
          {% endif %}
          {{ ns.total }}

      - name: "Bar Bouteilles Autres"
        unique_id: bar_bouteilles_autres
        unit_of_measurement: "btls"
        icon: mdi:bottle-soda
        state: >
          {% set total = states('sensor.bar_nombre_de_bouteilles') | int(0) %}
          {% set rhum = states('sensor.bar_bouteilles_rhum') | int(0) %}
          {% set whi  = states('sensor.bar_bouteilles_whisky') | int(0) %}
          {% set gin  = states('sensor.bar_bouteilles_gin') | int(0) %}
          {% set vod  = states('sensor.bar_bouteilles_vodka') | int(0) %}
          {% set teq  = states('sensor.bar_bouteilles_tequila_mezcal') | int(0) %}
          {% set liq  = states('sensor.bar_bouteilles_liqueurs') | int(0) %}
          {% set vin  = states('sensor.bar_bouteilles_vin') | int(0) %}
          {{ [0, total - (rhum+whi+gin+vod+teq+liq+vin)] | max }}

      - name: "ABV Maison"
        unique_id: bar_abv_maison_estime
        unit_of_measurement: "%"
        state: >
          {% set abv = states('input_number.bar_maison_abv_base') | float(0) %}
          {% set v_base = states('input_number.bar_maison_volume_base_ml') | float(0) %}
          {% set v_final = states('sensor.bar_volume_final_estime') | float(0) %}
          {% if abv > 0 and v_base > 0 and v_final > 0 %}
            {{ (abv * v_base / v_final) | round(1) }}
          {% else %}
            0
          {% endif %}
          

  - trigger:
      - platform: event
        event_type: "EVENT_ACCORD_BARMAN_REUSSI"
      - platform: event
        event_type: "VIDER_ACCORD_BARMAN"
    sensor:
      - name: "IA Barman Accord"
        unique_id: ia_barman_accord
        icon: mdi:shaker
        state: >
          {% if trigger.event.event_type == "VIDER_ACCORD_BARMAN" %}
            Vide
          {% else %}
            Prêt
          {% endif %}
        attributes:
          reponse: >
            {% if trigger.event.event_type == "VIDER_ACCORD_BARMAN" %}
              
            {% else %}
              {{ trigger.event.data.reponse }}
            {% endif %}
          selection_label: >
            {% if trigger.event.event_type == "VIDER_ACCORD_BARMAN" %}
              
            {% else %}
              {{ trigger.event.data.selection_label }}
            {% endif %}
          type_demande: >
            {% if trigger.event.event_type == "VIDER_ACCORD_BARMAN" %}
              
            {% else %}
              {{ trigger.event.data.type_demande }}
            {% endif %}
          ingredients_dispo: >
            {% if trigger.event.event_type == "VIDER_ACCORD_BARMAN" %}
              
            {% else %}
              {{ trigger.event.data.ingredients_dispo }}
            {% endif %}
          occasion: >
            {% if trigger.event.event_type == "VIDER_ACCORD_BARMAN" %}
              
            {% else %}
              {{ trigger.event.data.occasion }}
            {% endif %}
  - trigger:
      - platform: event
        event_type: "UPDATE_BAR_FINAL"
      - platform: homeassistant
        event: start

    sensor:
      - name: "Bar Supersensor"
        unique_id: bar_supersensor

        # Au démarrage : on ne force pas une "nouvelle" valeur,
        # on garde ce que HA a restauré (sinon ça te fait croire que c'est "neuf")
        state: >
          {% if trigger.platform == 'event' %}
            {{ now().strftime('%d/%m/%Y %H:%M:%S') }}
          {% else %}
            {{ this.state | default(now().strftime('%d/%m/%Y %H:%M:%S')) }}
          {% endif %}

        attributes:
          spiritueux: >
            {% if trigger.platform == 'event'
                  and trigger.event.data is defined
                  and trigger.event.data.new_collection is defined %}
              {{ trigger.event.data.new_collection }}
            {% else %}
              {{ this.attributes.spiritueux | default({}, true) }}
            {% endif %}

  # Réponse IA brute


  - trigger:
      - platform: event
        event_type: "REMPLIR_SPIRITUEUX_RECHERCHE"
      - platform: event
        event_type: "VIDER_SPIRITUEUX_RECHERCHE"
    sensor:
      - name: "Bar Spiritueux Recherche"
        unique_id: bar_spiritueux_recherche
        state: >
          {% if trigger.event.event_type == "VIDER_SPIRITUEUX_RECHERCHE" %}
            Prêt à rechercher
          {% else %}
            Prêt
          {% endif %}
        attributes:
          payload: >
            {% if trigger.event.event_type == "VIDER_SPIRITUEUX_RECHERCHE" %}
              {}
            {% else %}
              {{ trigger.event.data.payload }}
            {% endif %}
  # Compteurs + profil
  - sensor:
      - name: "Bar Nombre de Bouteilles"
        unique_id: bar_nombre_bouteilles
        unit_of_measurement: "btls"
        icon: mdi:bottle-tonic
        state: >
          {% set raw = state_attr('sensor.bar_supersensor', 'spiritueux') %}
          {% set bar = raw if raw is mapping else (raw | from_json if raw is string else {}) %}
          {% if bar is mapping %}
            {% set ns = namespace(total=0) %}
            {% for key, val in bar.items() %}
              {% set ns.total = ns.total + (val.nombre_bouteilles | int(0)) %}
            {% endfor %}
            {{ ns.total }}
          {% else %}
            0
          {% endif %}

      - name: "Bar Valeur Totale"
        unique_id: bar_valeur_totale
        unit_of_measurement: "€"
        icon: mdi:currency-eur
        state: >
          {% set raw = state_attr('sensor.bar_supersensor', 'spiritueux') %}
          {% set bar = raw if raw is mapping else (raw | from_json if raw is string else {}) %}
          {% if bar is mapping %}
            {% set ns = namespace(valeur=0) %}
            {% for key, val in bar.items() %}
              {% set prix_data = val.prix_moyen.valeur if val.prix_moyen is mapping else val.prix_moyen %}
              {% set prix = prix_data | int(0) %}
              {% set qte = val.nombre_bouteilles | int(0) %}
              {% set ns.valeur = ns.valeur + (prix * qte) %}
            {% endfor %}
            {{ ns.valeur }}
          {% else %}
            0
          {% endif %}

      - name: "Spiritueux Sélectionné Profil"
        unique_id: bar_selectionne_profil
        state: >
          {% set selection = states('input_select.bar_selection_suppression') %}
          {{ selection if selection not in ['Aucun', '', none] else 'Aucun' }}
        attributes:
          profil_aromatique: >
            {% set selection_label = states('input_select.bar_selection_suppression') %}
            {% set raw = state_attr('sensor.bar_supersensor', 'spiritueux') %}
            {% set bar = raw if raw is mapping else (raw | from_json if raw is string else {}) %}
            {% set ns = namespace(found='') %}
            
            {% if bar is mapping and selection_label not in ['Aucun', '', none] %}
              {% for id, info in bar.items() %}
            
                {# --- type --- #}
                {% set t = (info.type.valeur if info.type is mapping and info.type.valeur is defined else info.type) | default('') | string | lower %}
                {% set nom = (info.nom.valeur if info.nom is mapping else info.nom) | default('Sans nom') %}
                {% set an = (info.annee.valeur if info.annee is mapping else info.annee) | default('-') %}
            
                {# --- maison ? --- #}
                {% set est_maison = false %}
                {% if info.maison is defined %}
                  {% if info.maison is mapping and info.maison.est_maison is defined %}
                    {% set est_maison = info.maison.est_maison %}
                  {% elif info.maison is string and info.maison|trim not in ['', 'none', 'unknown'] %}
                    {% set m = info.maison | from_json %}
                    {% if m is mapping and m.est_maison is defined %}{% set est_maison = m.est_maison %}{% endif %}
                  {% endif %}
                {% endif %}
            
                {# --- couleur vin (safe) --- #}
                {% set c = '' %}
                {% if 'vin' in t and info.couleur is defined %}
                  {% if info.couleur is mapping and info.couleur.valeur is defined %}
                    {% set c = info.couleur.valeur | string | lower %}
                  {% else %}
                    {% set c = info.couleur | string | lower %}
                  {% endif %}
                {% endif %}
            
                {# --- emoji --- #}
                {% set emoji =
                  ('🔴' if 'rouge' in c else ('🌕' if 'blanc' in c else ('🏮' if 'ros' in c else '⚪')))
                  if 'vin' in t
                  else (
                    '🥃' if ('rhum' in t or 'whisk' in t or 'whisky' in t or 'bourbon' in t or 'scotch' in t)
                    else ('🍸' if 'gin' in t
                    else ('🧊' if 'vodka' in t
                    else ('🌵' if ('tequila' in t or 'mezcal' in t)
                    else ('🍯' if ('liqueur' in t or 'crème' in t or 'creme' in t)
                    else '🍾')))))
                %}
            
                {# --- label identique à l'input_select --- #}
                {% set badge = '🏠 ' if est_maison else '' %}
                {% set label = badge ~ emoji ~ ' ' ~ nom %}
                {% if an not in ['-', '', none] %}
                  {% set label = label ~ " (" ~ an ~ ")" %}
                {% endif %}
            
                {% if label == selection_label %}
                  {% set ns.found = id %}
                {% endif %}
            
              {% endfor %}
            {% endif %}
            
            {% if ns.found != '' and ns.found in bar %}
              {{ bar[ns.found].profil_aromatique.valeur if bar[ns.found].profil_aromatique is mapping else bar[ns.found].profil_aromatique }}
            {% else %}
              N/A
            {% endif %}

# -----------------
# AUTOMATIONS
# -----------------

automation:
  - alias: "Bar - Vider conseil barman après 1h"
    id: bar_vider_conseil_barman_apres_1h
    mode: restart
    trigger:
      - platform: event
        event_type: "EVENT_ACCORD_BARMAN_REUSSI"

    action:
      - delay: "01:00:00"
      - event: VIDER_ACCORD_BARMAN
  - alias: "IA - Accord du Barman (Cocktail)"
    id: bar_ia_accord_barman_cocktail
    mode: restart
    trigger:
      - platform: state
        entity_id: input_button.bar_bouton_ia_cocktail

    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.bar_ia_erreur

      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.bar_ia_en_cours

      - variables:
          # --- sources UI ---
          selection_label: "{{ states('input_select.bar_selection_suppression') }}"
          type_demande: "{{ states('input_select.bar_type_pour_cocktail') }}"
          ingredients_dispo: "{{ states('input_text.bar_ingredients_disponibles') | string }}"
          occasion: "{{ states('input_text.bar_plat_cocktail') | string }}"

          # --- inventaire ---
          raw: "{{ state_attr('sensor.bar_supersensor', 'spiritueux') | default({}, true) }}"
          bar: >-
            {{ raw if raw is mapping else (raw | from_json if raw is string and raw|trim not in ['', 'none', 'unknown'] else {}) }}

          # --- retrouver l'ID de la bouteille sélectionnée (gère " #2", " #3", etc.) ---
          selected_id: >-
            {% set base = selection_label %}
            {% set idx = 1 %}
            {% if ' #' in selection_label %}
              {% set base = selection_label.rsplit(' #', 1)[0] %}
              {% set idx = selection_label.rsplit(' #', 1)[1] | int(1) %}
            {% endif %}

            {% set ns = namespace(found='', count=0) %}

            {% if bar is mapping and selection_label not in ['Aucun', '', none] %}
              {% for sid, info in bar.items() %}

                {% set t = (info.type.valeur if info.type is mapping and info.type.valeur is defined else info.type) | default('') | string | lower %}
                {% set nom = (info.nom.valeur if info.nom is mapping else info.nom) | default('Sans nom') %}
                {% set an  = (info.annee.valeur if info.annee is mapping else info.annee) | default('-') %}

                {% set est_maison = false %}
                {% if info.maison is defined %}
                  {% if info.maison is mapping and info.maison.est_maison is defined %}
                    {% set est_maison = info.maison.est_maison %}
                  {% elif info.maison is string and info.maison|trim not in ['', 'none', 'unknown'] %}
                    {% set m = info.maison | from_json %}
                    {% if m is mapping and m.est_maison is defined %}{% set est_maison = m.est_maison %}{% endif %}
                  {% endif %}
                {% endif %}

                {% set c = '' %}
                {% if 'vin' in t and info.couleur is defined %}
                  {% if info.couleur is mapping and info.couleur.valeur is defined %}
                    {% set c = info.couleur.valeur | string | lower %}
                  {% else %}
                    {% set c = info.couleur | string | lower %}
                  {% endif %}
                {% endif %}

                {% set emoji =
                  ('🔴' if 'rouge' in c else ('🌕' if 'blanc' in c else ('🏮' if 'ros' in c else '⚪')))
                  if 'vin' in t
                  else (
                    '🥃' if ('rhum' in t or 'whisk' in t or 'whisky' in t or 'bourbon' in t or 'scotch' in t)
                    else ('🍸' if 'gin' in t
                    else ('🧊' if 'vodka' in t
                    else ('🌵' if ('tequila' in t or 'mezcal' in t)
                    else ('🍯' if ('liqueur' in t or 'crème' in t or 'creme' in t)
                    else '🍾')))))
                %}

                {% set badge = '🏠 ' if est_maison else '' %}
                {% set label = badge ~ emoji ~ ' ' ~ nom %}
                {% if an not in ['-', '', none] %}
                  {% set label = label ~ ' (' ~ an ~ ')' %}
                {% endif %}

                {% if label == base %}
                  {% set ns.count = ns.count + 1 %}
                  {% if ns.count == idx %}
                    {% set ns.found = sid %}
                  {% endif %}
                {% endif %}

              {% endfor %}
            {% endif %}

            {{ ns.found }}

          # --- objet bouteille si trouvée ---
          bouteille: >-
            {% if selected_id != '' and bar is mapping and selected_id in bar %}
              {{ bar[selected_id] }}
            {% else %}
              {{ {} }}
            {% endif %}

          bouteille_ok: "{{ bouteille is mapping and bouteille|count > 0 }}"

          # --- liste stock (résumé) si pas de bouteille ---
          stock_resume: >-
            {% if bar is mapping %}
              {%- for sid, info in bar.items() -%}
                {%- set t = (info.type.valeur if info.type is mapping and info.type.valeur is defined else info.type) | default('') | string -%}
                {%- set nom = (info.nom.valeur if info.nom is mapping else info.nom) | default('Sans nom') -%}
                {%- set qte = info.nombre_bouteilles | int(0) -%}
                - {{ nom }} ({{ t }}), stock: {{ qte }}
              {%- endfor -%}
            {% else %}
              -
            {% endif %}

      - service: ai_task.generate_data
        data:
          entity_id: ai_task.google_ai_task_2
          task_name: accord barman cocktail
          instructions: >-
            Tu es un barman professionnel.
            Réponds uniquement en JSON valide, sans texte autour.

            Réponse courte et concise.

            CONTEXTE:
            - Occasion: "{{ occasion }}"
            - Ingrédients disponibles: "{{ ingredients_dispo }}"
            - Type demandé: "{{ type_demande }}"

            Bouteille sélectionnée (si présente):
            {{ bouteille | tojson }}

            RÈGLES:
            - Si bouteille fournie → base le cocktail dessus.
            - Sinon → choisis une base cohérente.
            - Max 6 ingrédients.
            - Max 5 étapes.
            - Raison courte (1 phrase).

            FORMAT:
            {
              "cocktail": "",
              "style": "",
              "raison": "",
              "base": "",
              "ingredients": [],
              "recette": [],
              "verre": "",
              "garnish": "",
              "niveau": "simple|intermediaire|avance",
              "alternatives": []
            }
        response_variable: cocktail_result

      - if:
          - condition: template
            value_template: "{{ cocktail_result.data is defined and (cocktail_result.data | string | length) > 40 }}"
        then:
          - variables:
              clean: >-
                {% set raw = cocktail_result.data | default('', true) | string %}
                {{ raw
                  | replace('```json','')
                  | replace('```','')
                  | replace('\ufeff','')
                  | replace('“','"')
                  | replace('”','"')
                  | replace("’","'")
                  | trim
                }}
          - event: EVENT_ACCORD_BARMAN_REUSSI
            event_data:
              reponse: "{{ clean }}"
              selection_label: "{{ selection_label }}"
              type_demande: "{{ type_demande }}"
              ingredients_dispo: "{{ ingredients_dispo }}"
              occasion: "{{ occasion }}"
        else:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.bar_ia_erreur

      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.bar_ia_en_cours

  - alias: "Bar - Mise à jour liste (comme la cave)"
    id: bar_update_select
