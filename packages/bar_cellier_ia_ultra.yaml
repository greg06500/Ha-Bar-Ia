                  {% if m is mapping and m.est_maison is defined %}{% set est_maison = m.est_maison %}{% endif %}
                {% endif %}
              {% endif %}
            
              {# --- couleur vin (si type = vin) --- #}
              {% set c = '' %}
              {% if 'vin' in t and info.couleur is defined %}
                {% if info.couleur is mapping and info.couleur.valeur is defined %}
